# CI gate — build + tsc + vitest + E2E bloqueante (secrets E2E_* obrigatórios).
# Migrations: teste_db via deploy-test.yml; produção só via deploy.yml (workflow_dispatch).

name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build

      - name: Unit tests (Vitest)
        run: npm test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require E2E credentials
        env:
          E2E_EMAIL: ${{ secrets.E2E_SUPERVISOR_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_SUPERVISOR_PASSWORD }}
          E2E_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          missing=""
          [ -z "$E2E_EMAIL" ] && missing="$missing E2E_SUPERVISOR_EMAIL"
          [ -z "$E2E_PASSWORD" ] && missing="$missing E2E_SUPERVISOR_PASSWORD"
          [ -z "$E2E_URL" ] && missing="$missing E2E_BASE_URL"
          [ -z "$E2E_BYPASS" ] && missing="$missing VERCEL_AUTOMATION_BYPASS_SECRET"
          if [ -n "$missing" ]; then
            echo "::error::Secrets E2E ausentes:$missing"
            exit 1
          fi

      - name: Require teste_db seed credentials
        env:
          SUPABASE_TEST_PROJECT_REF: ${{ secrets.SUPABASE_TEST_PROJECT_REF }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
        run: |
          missing=""
          [ -z "$SUPABASE_TEST_PROJECT_REF" ] && missing="$missing SUPABASE_TEST_PROJECT_REF"
          [ -z "$SUPABASE_TEST_SERVICE_ROLE_KEY" ] && missing="$missing SUPABASE_TEST_SERVICE_ROLE_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Secrets seed teste_db ausentes:$missing"
            exit 1
          fi

      - name: Seed E2E fixtures (teste_db)
        env:
          SUPABASE_TEST_PROJECT_REF: ${{ secrets.SUPABASE_TEST_PROJECT_REF }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
        run: |
          node scripts/qa/seed-e2e-person.mjs --apply
          node scripts/qa/seed-pack-accessories.mjs --apply
          node scripts/qa/seed-e2e-total-return-demo.mjs --apply
          node scripts/qa/seed-partial-return-demo.mjs --apply

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e
        env:
          CI: "true"
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_SUPERVISOR_EMAIL: ${{ secrets.E2E_SUPERVISOR_EMAIL }}
          E2E_SUPERVISOR_PASSWORD: ${{ secrets.E2E_SUPERVISOR_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
