# CI gate — build + unit tests em todo PR/push.
# E2E Playwright opcional quando secrets E2E_* estiverem configurados.
# Migrations: teste_db via deploy-test.yml; produção só via deploy.yml (workflow_dispatch).

name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Placeholders — build não precisa de Supabase real; middleware lê env em runtime.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build

      - name: Unit tests (Vitest)
        run: npm test

  e2e-smoke:
    name: Playwright smoke (opcional)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check E2E credentials
        id: e2e
        env:
          E2E_EMAIL: ${{ secrets.E2E_SUPERVISOR_EMAIL }}
        run: |
          if [ -z "$E2E_EMAIL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E_SUPERVISOR_EMAIL não configurado — smoke Playwright ignorado."
          fi

      - name: Install Playwright browsers
        if: steps.e2e.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E
        if: steps.e2e.outputs.skip != 'true'
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_SUPERVISOR_EMAIL: ${{ secrets.E2E_SUPERVISOR_EMAIL }}
          E2E_SUPERVISOR_PASSWORD: ${{ secrets.E2E_SUPERVISOR_PASSWORD }}
